<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--white:#fff;--border:#e5e7eb;
  --text:#111827;--muted:#9ca3af;--sub:#6b7280;
  --qoo10:#ff6b35;--owm:#10b981;--amazon:#f59e0b;--rakuten:#a855f7;--accent:#3b82f6;
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px}
header{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-size:15px;font-weight:700;letter-spacing:-.01em}
.logo em{color:var(--accent);font-style:normal}
.controls{display:flex;align-items:center;gap:8px}
select{
  background:var(--white);border:1px solid var(--border);color:var(--text);
  padding:7px 11px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;outline:none;
}
select:focus{border-color:var(--accent)}
.btn-load{
  background:var(--accent);color:#fff;border:none;
  padding:7px 18px;border-radius:8px;font-size:13px;font-family:inherit;
  font-weight:500;cursor:pointer;transition:opacity .15s;
}
.btn-load:hover{opacity:.87}
.btn-load:disabled{opacity:.4;cursor:default}
.live-dot{width:7px;height:7px;border-radius:50%;background:#d1d5db;display:inline-block}
.live-dot.on{background:#22c55e}
.live-txt{font-size:12px;color:var(--muted)}
main{padding:28px 32px;max-width:1440px;margin:0 auto}
.sec-label{
  font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;font-family:'DM Mono',monospace;
}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{
  background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 22px;transition:box-shadow .2s;
}
.kpi:hover{box-shadow:0 2px 14px rgba(0,0,0,.07)}
.kpi-lbl{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.kpi-lbl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kpi-val{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;line-height:1}
.kpi-sub{font-size:12px;color:var(--sub);margin-top:7px}
.platform-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.pc{
  background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;border-top:3px solid transparent;transition:box-shadow .2s;
}
.pc:hover{box-shadow:0 2px 14px rgba(0,0,0,.07)}
.pc.q{border-top-color:var(--qoo10)}.pc.o{border-top-color:var(--owm)}
.pc.a{border-top-color:var(--amazon)}.pc.r{border-top-color:var(--rakuten)}
.pc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pc-name{font-size:13px;font-weight:500}
.pc-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:400}
.tq{background:#fff4f0;color:var(--qoo10)}.to{background:#ecfdf5;color:var(--owm)}
.ta{background:#fffbeb;color:var(--amazon)}.tr{background:#faf5ff;color:var(--rakuten)}
.pc-sales{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;margin-bottom:5px}
.pc-meta{font-size:12px;color:var(--sub);line-height:1.7}
.pc-bar{height:4px;background:var(--bg);border-radius:2px;margin-top:13px;overflow:hidden}
.pc-bar-fill{height:100%;border-radius:2px;transition:width .7s ease}
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:24px}
.cc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px}
.cc-title{font-size:14px;font-weight:500;margin-bottom:3px}
.cc-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.cc-wrap{position:relative;height:240px}
.tc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:24px}
.tc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;color:var(--muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase;}
td{padding:11px 12px;border-bottom:1px solid #f3f4f6;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.mono{font-family:'DM Mono',monospace}
.rank{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);width:30px}
.bar-wrap{width:100px}
.bar-bg{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--accent)}
.loading{display:flex;align-items:center;justify-content:center;height:180px;color:var(--muted);font-size:13px;gap:10px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.notice{border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:none}
.notice.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e}
.notice.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
@media(max-width:1100px){.kpi-row,.platform-row{grid-template-columns:repeat(2,1fr)}.chart-row{grid-template-columns:1fr}}
@media(max-width:640px){main{padding:16px}header{padding:0 16px}.kpi-row,.platform-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">Sales <em>Dashboard</em></div>
  <div class="controls">
    <span class="live-dot" id="liveDot"></span>
    <span class="live-txt" id="liveTxt">연결 전</span>
    <select id="selYear"><option value="2026">2026년</option><option value="2025">2025년</option></select>
    <select id="selMonth">
      <option value="">전체 (연간)</option>
      <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
      <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
      <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
    </select>
    <button class="btn-load" id="btnLoad" onclick="loadAll()">불러오기</button>
  </div>
</header>

<main>
  <div class="notice" id="notice"></div>

  <div class="sec-label">전체 요약</div>
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-lbl"><span class="kpi-lbl-dot" style="background:var(--accent)"></span>총 매출</div><div class="kpi-val" id="kSales">—</div><div class="kpi-sub" id="kSalesSub"></div></div>
    <div class="kpi"><div class="kpi-lbl"><span class="kpi-lbl-dot" style="background:#22c55e"></span>순이익</div><div class="kpi-val" id="kProfit">—</div><div class="kpi-sub" id="kProfitSub"></div></div>
    <div class="kpi"><div class="kpi-lbl"><span class="kpi-lbl-dot" style="background:var(--muted)"></span>총 주문</div><div class="kpi-val" id="kOrders">—</div><div class="kpi-sub" id="kOrdersSub"></div></div>
    <div class="kpi"><div class="kpi-lbl"><span class="kpi-lbl-dot" style="background:#f87171"></span>취소율</div><div class="kpi-val" id="kCancel">—</div><div class="kpi-sub" id="kCancelSub"></div></div>
  </div>

  <div class="sec-label">플랫폼별 매출</div>
  <div class="platform-row">
    <div class="pc q"><div class="pc-head"><span class="pc-name">큐텐 23Y</span><span class="pc-tag tq">Qoo10</span></div><div class="pc-sales" id="ps0" style="color:var(--qoo10)">—</div><div class="pc-meta" id="pm0">—</div><div class="pc-bar"><div class="pc-bar-fill" id="pb0" style="background:var(--qoo10)"></div></div></div>
    <div class="pc o"><div class="pc-head"><span class="pc-name">큐텐 OWM</span><span class="pc-tag to">Qoo10</span></div><div class="pc-sales" id="ps1" style="color:var(--owm)">—</div><div class="pc-meta" id="pm1">—</div><div class="pc-bar"><div class="pc-bar-fill" id="pb1" style="background:var(--owm)"></div></div></div>
    <div class="pc a"><div class="pc-head"><span class="pc-name">아마존 JP</span><span class="pc-tag ta">Amazon</span></div><div class="pc-sales" id="ps2" style="color:var(--amazon)">—</div><div class="pc-meta" id="pm2">—</div><div class="pc-bar"><div class="pc-bar-fill" id="pb2" style="background:var(--amazon)"></div></div></div>
    <div class="pc r"><div class="pc-head"><span class="pc-name">라쿠텐</span><span class="pc-tag tr">Rakuten</span></div><div class="pc-sales" id="ps3" style="color:var(--rakuten)">—</div><div class="pc-meta" id="pm3">—</div><div class="pc-bar"><div class="pc-bar-fill" id="pb3" style="background:var(--rakuten)"></div></div></div>
  </div>

  <div class="chart-row">
    <div class="cc">
      <div class="cc-title">월별 매출 추이</div>
      <div class="cc-sub">막대: 플랫폼별 · 선: 전체 합계</div>
      <div class="cc-wrap"><canvas id="cMonthly"></canvas></div>
    </div>
    <div class="cc">
      <div class="cc-title">플랫폼 비중</div>
      <div class="cc-sub">이번 기간 매출 구성</div>
      <div class="cc-wrap"><canvas id="cDonut"></canvas></div>
    </div>
  </div>

  <div class="tc">
    <div class="tc-head">
      <div><div class="cc-title">SKU별 매출 순위</div><div class="cc-sub" style="margin-bottom:0">전 플랫폼 합산 Top 15</div></div>
      <select id="selSku" onchange="renderSku()" style="font-size:12px">
        <option value="all">전체 플랫폼</option>
        <option value="qoo10_23y">큐텐 23Y</option>
        <option value="qoo10_owm">큐텐 OWM</option>
        <option value="amazon">아마존</option>
        <option value="rakuten">라쿠텐</option>
      </select>
    </div>
    <div id="skuWrap"><div class="loading">불러오기 버튼을 눌러주세요</div></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://eongxuwwajldubammbvx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbmd4dXd3YWpsZHViYW1tYnZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDE3MjQsImV4cCI6MjA5MjE3NzcyNH0.tET5niftasMhjJQQPTbBTUBIDplPLrQXmQdxIWs_Sw0';

let D = null;
let cM = null, cD = null;

async function sbQuery(table, filters = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}&limit=100000`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    }
  });
  if (!res.ok) throw new Error(`Supabase 오류: ${res.status}`);
  return res.json();
}

async function loadAll() {
  const btn = id('btnLoad');
  btn.disabled = true; btn.textContent = '불러오는 중…';
  hideNotice();

  const year  = id('selYear').value;
  const month = id('selMonth').value;

  try {
    // 각 테이블에서 데이터 가져오기
    let q23yFilter = `yy=eq.${year}`;
    let owmFilter  = `yy=eq.${year}`;
    let amzFilter  = `yy=eq.${year}`;
    let rakFilter  = `yy=eq.${year}`;

    if (month) {
      q23yFilter += `&mm=eq.${month}`;
      owmFilter  += `&mm=eq.${month}`;
      amzFilter  += `&mm=eq.${month}`;
      rakFilter  += `&mm=eq.${month}`;
    }

    const [q23y, owm, amz, rak] = await Promise.all([
      sbQuery('qoo10_23y', q23yFilter + '&select=mm,reason,sales,fee,qty,sku,product_name'),
      sbQuery('qoo10_owm',  owmFilter  + '&select=mm,reason,sales,fee,qty,sku,product_name'),
      sbQuery('amazon',     amzFilter  + '&select=mm,order_status,sales,qty,sku,product_name,fba,krjp,label_cost,import_tax'),
      sbQuery('rakuten',    rakFilter  + '&select=mm,status,sales,qty,sku,product_name,cogs,shipping'),
    ]);

    D = { q23y, owm, amz, rak };
    renderAll();
    setLive(true);
  } catch(e) {
    showNotice('err', '데이터 로드 실패: ' + e.message);
  }

  btn.disabled = false; btn.textContent = '새로고침';
}

function calcQ23Y() {
  const rows = D.q23y || [];
  const orders  = rows.filter(r => r.reason === '주문');
  const cancels = rows.filter(r => r.reason === '취소');
  const sales  = orders.reduce((s, r) => s + (r.sales || 0), 0);
  const fee    = orders.reduce((s, r) => s + (r.fee   || 0), 0);
  const qty    = orders.reduce((s, r) => s + (r.qty   || 0), 0);
  const cQty   = cancels.reduce((s, r) => s + Math.abs(r.qty || 0), 0);
  return { sales, profit: sales - fee, orders: orders.length, qty, cancelQty: cQty, fee };
}

function calcOwm() {
  const rows = D.owm || [];
  const orders  = rows.filter(r => r.reason === '주문');
  const cancels = rows.filter(r => r.reason === '취소');
  const sales = orders.reduce((s, r) => s + (r.sales || 0), 0);
  const fee   = orders.reduce((s, r) => s + (r.fee   || 0), 0);
  const qty   = orders.reduce((s, r) => s + (r.qty   || 0), 0);
  const cQty  = cancels.reduce((s, r) => s + Math.abs(r.qty || 0), 0);
  return { sales, profit: sales - fee, orders: orders.length, qty, cancelQty: cQty, fee };
}

function calcAmz() {
  const rows = D.amz || [];
  const orders  = rows.filter(r => r.order_status !== 'Cancelled');
  const cancels = rows.filter(r => r.order_status === 'Cancelled');
  const sales = orders.reduce((s, r) => s + (r.sales || 0), 0);
  const cost  = orders.reduce((s, r) => s + (r.fba || 0) + (r.krjp || 0) + (r.label_cost || 0) + (r.import_tax || 0), 0);
  const qty   = orders.reduce((s, r) => s + (r.qty || 0), 0);
  const cQty  = cancels.reduce((s, r) => s + (r.qty || 0), 0);
  return { sales, profit: sales - cost, orders: orders.length, qty, cancelQty: cQty, totalCost: cost };
}

function calcRak() {
  const CANCEL = ['800','900'];
  const rows   = D.rak || [];
  const orders  = rows.filter(r => !CANCEL.includes(String(r.status)));
  const cancels = rows.filter(r =>  CANCEL.includes(String(r.status)));
  const sales = orders.reduce((s, r) => s + (r.sales || 0), 0);
  const cost  = orders.reduce((s, r) => s + (r.cogs || 0) + (r.shipping || 0), 0);
  const qty   = orders.reduce((s, r) => s + (r.qty || 0), 0);
  const cQty  = cancels.reduce((s, r) => s + (r.qty || 0), 0);
  return { sales, profit: sales - cost, orders: orders.length, qty, cancelQty: cQty, totalCost: cost };
}

function renderAll() {
  const q = calcQ23Y(), o = calcOwm(), a = calcAmz(), r = calcRak();
  const total = {
    sales:     q.sales + o.sales + a.sales + r.sales,
    profit:    q.profit + o.profit + a.profit + r.profit,
    orders:    q.orders + o.orders + a.orders + r.orders,
    qty:       q.qty + o.qty + a.qty + r.qty,
    cancelQty: q.cancelQty + o.cancelQty + a.cancelQty + r.cancelQty,
  };

  // KPI
  set('kSales',    '¥' + fm(total.sales));
  set('kSalesSub', `주문 ${fm(total.orders)}건`);
  set('kProfit',   '¥' + fm(total.profit));
  set('kProfitSub', `마진율 ${pc(total.profit, total.sales)}%`);
  set('kOrders',   fm(total.orders) + '건');
  set('kOrdersSub', `수량 ${fm(total.qty)}개`);
  set('kCancel',   pc(total.cancelQty, total.qty + total.cancelQty) + '%');
  set('kCancelSub', `취소 ${fm(total.cancelQty)}개`);

  // 플랫폼 카드
  const platforms = [q, o, a, r];
  const totalSales = total.sales;
  platforms.forEach((p, i) => {
    set(`ps${i}`, '¥' + fm(p.sales));
    const cost = p.fee ?? p.totalCost ?? 0;
    set(`pm${i}`, `주문 ${fm(p.orders)}건 · 비용 ${pc(cost, p.sales)}%`);
    id(`pb${i}`).style.width = (totalSales > 0 ? p.sales / totalSales * 100 : 0).toFixed(1) + '%';
  });

  renderMonthly(q, o, a, r);
  renderDonut(q, o, a, r);
  renderSku();
}

function monthlySum(rows, reasonFilter, statusFilter, cancelStatuses) {
  const byMonth = Array(12).fill(0);
  rows.forEach(r => {
    const m = (r.mm || 1) - 1;
    if (reasonFilter && r.reason !== reasonFilter) return;
    if (statusFilter && cancelStatuses && cancelStatuses.includes(String(r.status))) return;
    if (statusFilter === 'notCancelled' && r.order_status === 'Cancelled') return;
    byMonth[m] += r.sales || 0;
  });
  return byMonth;
}

function renderMonthly(q, o, a, r) {
  const labels = Array.from({length:12}, (_,i) => `${i+1}월`);
  const q23 = monthlySum(D.q23y, '주문');
  const owm = monthlySum(D.owm,  '주문');
  const amz = (D.amz||[]).reduce((acc,r) => { if(r.order_status!=='Cancelled'){ acc[(r.mm||1)-1]+=(r.sales||0);} return acc; }, Array(12).fill(0));
  const rak = (D.rak||[]).reduce((acc,r) => { if(!['800','900'].includes(String(r.status))){ acc[(r.mm||1)-1]+=(r.sales||0);} return acc; }, Array(12).fill(0));
  const tot = q23.map((_,i) => q23[i]+owm[i]+amz[i]+rak[i]);

  const ctx = id('cMonthly').getContext('2d');
  if (cM) cM.destroy();
  cM = new Chart(ctx, {
    data: { labels,
      datasets: [
        {type:'bar',  label:'큐텐 23Y', data:q23, backgroundColor:'rgba(255,107,53,.7)',  borderRadius:3, order:2},
        {type:'bar',  label:'큐텐 OWM', data:owm, backgroundColor:'rgba(16,185,129,.7)', borderRadius:3, order:2},
        {type:'bar',  label:'아마존',   data:amz, backgroundColor:'rgba(245,158,11,.7)', borderRadius:3, order:2},
        {type:'bar',  label:'라쿠텐',   data:rak, backgroundColor:'rgba(168,85,247,.7)', borderRadius:3, order:2},
        {type:'line', label:'합계',     data:tot, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.07)',
          borderWidth:2, pointRadius:3, pointBackgroundColor:'#3b82f6', fill:true, tension:.35, order:1},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{position:'bottom', labels:{font:{size:11}, boxWidth:10, padding:12}},
        tooltip:{callbacks:{label: c => ` ${c.dataset.label}: ¥${fm(c.raw)}`}}
      },
      scales:{
        x:{stacked:true, grid:{display:false}, ticks:{font:{size:11}}},
        y:{stacked:false, grid:{color:'#f3f4f6'}, ticks:{font:{size:11}, callback: v => '¥'+fmShort(v)}}
      }
    }
  });
}

function renderDonut(q, o, a, r) {
  const ctx = id('cDonut').getContext('2d');
  if (cD) cD.destroy();
  cD = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels:['큐텐 23Y','큐텐 OWM','아마존','라쿠텐'],
      datasets:[{
        data:[q.sales, o.sales, a.sales, r.sales],
        backgroundColor:['#ff6b35','#10b981','#f59e0b','#a855f7'],
        borderWidth:0, hoverOffset:6
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'66%',
      plugins:{
        legend:{position:'bottom', labels:{font:{size:11}, boxWidth:10, padding:12}},
        tooltip:{callbacks:{label: c => {
          const total = c.dataset.data.reduce((a,b)=>a+b,0);
          return ` ${c.label}: ¥${fm(c.raw)} (${pc(c.raw,total)}%)`;
        }}}
      }
    }
  });
}

function renderSku() {
  if (!D) return;
  const platform = id('selSku').value;
  const wrap = id('skuWrap');
  const map = {};

  const addRows = (rows, skuKey, nameKey, salesKey, qtyKey, filterFn) => {
    (rows||[]).filter(filterFn).forEach(r => {
      const key  = r[skuKey] || '기타';
      const name = r[nameKey] || key;
      if (!map[key]) map[key] = { sku: key, name, sales: 0, qty: 0 };
      map[key].sales += r[salesKey] || 0;
      map[key].qty   += r[qtyKey]   || 0;
    });
  };

  if (platform === 'all' || platform === 'qoo10_23y')
    addRows(D.q23y, 'sku', 'product_name', 'sales', 'qty', r => r.reason === '주문');
  if (platform === 'all' || platform === 'qoo10_owm')
    addRows(D.owm,  'sku', 'product_name', 'sales', 'qty', r => r.reason === '주문');
  if (platform === 'all' || platform === 'amazon')
    addRows(D.amz,  'sku', 'product_name', 'sales', 'qty', r => r.order_status !== 'Cancelled');
  if (platform === 'all' || platform === 'rakuten')
    addRows(D.rak,  'sku', 'product_name', 'sales', 'qty', r => !['800','900'].includes(String(r.status)));

  const rows = Object.values(map).sort((a,b) => b.sales - a.sales).slice(0, 15);
  if (!rows.length) { wrap.innerHTML='<div class="loading">데이터 없음</div>'; return; }

  const maxS = rows[0].sales;
  const totS = rows.reduce((s,r) => s + r.sales, 0);

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>#</th><th>상품명 / SKU</th><th>매출</th><th>수량</th><th>비중</th><th style="width:110px"></th>
    </tr></thead>
    <tbody>${rows.map((r,i) => `
      <tr>
        <td class="rank">${String(i+1).padStart(2,'0')}</td>
        <td>
          <div style="font-weight:500">${esc(r.name)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace">${esc(r.sku)}</div>
        </td>
        <td class="mono">¥${fm(r.sales)}</td>
        <td class="mono">${fm(r.qty)}</td>
        <td class="mono">${pc(r.sales,totS)}%</td>
        <td class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${pc(r.sales,maxS)}%"></div></div></td>
      </tr>`).join('')}
    </tbody></table>`;
}

const id  = s => document.getElementById(s);
const set = (s,v) => { const el=id(s); if(el) el.textContent=v };
const fm  = n => Math.round(n||0).toLocaleString('ja-JP');
const fmShort = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':Math.round(n);
const pc  = (a,b) => b>0 ? (a/b*100).toFixed(1) : '0.0';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setLive(on) {
  id('liveDot').className = 'live-dot' + (on?' on':'');
  id('liveTxt').textContent = on ? '연결됨' : '연결 전';
}
function showNotice(type, msg) {
  const el=id('notice'); el.className='notice '+type; el.textContent=msg; el.style.display='block';
}
function hideNotice() { id('notice').style.display='none'; }

function monthlySum(rows, reason) {
  const byMonth = Array(12).fill(0);
  (rows||[]).forEach(r => {
    if (r.reason === reason) byMonth[(r.mm||1)-1] += r.sales || 0;
  });
  return byMonth;
}

window.addEventListener('DOMContentLoaded', () => loadAll());
</script>
</body>
