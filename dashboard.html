<!-- 기존 코드 그대로 유지 + 아래 부분만 반영된 전체 -->
<!-- (중간 스타일/HTML은 동일, script만 핵심 수정됨) -->

<script>
const SUPABASE_URL = 'https://eongxuwwajldubammbvx.supabase.co';
const SUPABASE_KEY = '여기 그대로 유지';

let skuMapCache = {};
let D = null;
let charts = {};

// ✅ 수정: select=* 추가
async function sb(table, filter = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&${filter}&limit=200000`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(`${table} 오류: ${res.status}`);
  return res.json();
}

// ✅ loadAll 수정 (오늘 데이터 조회 방식 변경)
async function loadAll() {

  const year  = id('selYear').value;
  const month = id('selMonth').value;

  let f = `yy=eq.${year}`;
  if (month) f += `&mm=eq.${month}`;

  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth()+1;
  const d = today.getDate();
  const todayFilter = `yy=eq.${y}&mm=eq.${m}&dd=eq.${d}`;

  try {
    const [q23y, owm, amz, rak, skuMap,
           q23yToday, amzToday, rakToday] = await Promise.all([
      sb('qoo10_23y', f),
      sb('qoo10_owm', f),
      sb('amazon', f),
      sb('rakuten', f),
      sb('sku_map', ''),
      sb('qoo10_23y', todayFilter),
      sb('amazon', todayFilter),
      sb('rakuten', todayFilter)
    ]);

    skuMap.forEach(s => { skuMapCache[s.sku] = s; });

    D = { q23y, owm, amz, rak, q23yToday, amzToday, rakToday };

    renderAll();
  } catch(e) {
    console.error(e);
  }
}

// ✅ renderAll 수정 (원화 추가)
function renderAll() {

  const q = calcQ23(D.q23y);
  const o = calcQ23(D.owm);
  const a = calcAmz(D.amz);
  const r = calcRak(D.rak);

  const totalSales = q.sales + o.sales + a.sales + r.sales;

  set('kSales', '¥' + fm(totalSales));

  const FX = 9.4;
  set('kSalesSub', `₩ ${fm(totalSales * FX)}`);

  // 오늘 매출
  const tQ23 = calcQ23(D.q23yToday).sales;
  const tAmz = calcAmz(D.amzToday).sales;
  const tRak = calcRak(D.rakToday).sales;

  set('todaySales', '¥' + fm(tQ23 + tAmz + tRak));
  set('todayQ23', '¥' + fm(tQ23));
  set('todayAmz', '¥' + fm(tAmz));
  set('todayRak', '¥' + fm(tRak));
}

// ✅ 날짜 조회 기능 추가
async function loadByDate() {

  if (!D) {
    alert('먼저 불러오기');
    return;
  }

  const date = document.getElementById('selDate').value;
  if (!date) return alert('날짜 선택');

  const [y,m,d] = date.split('-');

  const filter = (rows) =>
    rows.filter(r =>
      String(r.yy) === y &&
      String(r.mm).padStart(2,'0') === m &&
      String(r.dd).padStart(2,'0') === d
    );

  const q = calcQ23(filter(D.q23y));
  const o = calcQ23(filter(D.owm));
  const a = calcAmz(filter(D.amz));
  const r = calcRak(filter(D.rak));

  const total = q.sales + o.sales + a.sales + r.sales;

  alert(
`날짜: ${date}

총 매출: ¥${fm(total)}

큐텐23Y: ¥${fm(q.sales)}
OWM: ¥${fm(o.sales)}
아마존: ¥${fm(a.sales)}
라쿠텐: ¥${fm(r.sales)}`
  );
}

window.addEventListener('DOMContentLoaded', () => loadAll());
</script>
