<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>매출 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
body{font-family:sans-serif;background:#f5f6f8;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
.btn{padding:6px 12px;border:none;background:#3b82f6;color:#fff;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<h2>매출 대시보드</h2>

<div class="card">
연도:
<select id="year">
<option value="2026">2026</option>
<option value="2025">2025</option>
</select>

월:
<select id="month">
<option value="">전체</option>
<option value="1">1</option><option value="2">2</option>
<option value="3">3</option><option value="4">4</option>
<option value="5">5</option><option value="6">6</option>
<option value="7">7</option><option value="8">8</option>
<option value="9">9</option><option value="10">10</option>
<option value="11">11</option><option value="12">12</option>
</select>

<input type="date" id="date">

<button class="btn" onclick="loadAll()">전체 조회</button>
<button class="btn" onclick="loadByDate()">일별 조회</button>
</div>

<div class="card">
<h3>총 매출</h3>
<div id="total"></div>
<div id="krw"></div>
</div>

<div class="card">
<canvas id="chart" height="100"></canvas>
</div>

<script>

const SUPABASE_URL = 'https://eongxuwwajldubammbvx.supabase.co';
const SUPABASE_KEY = 'YOUR_KEY';

const FX_FIXED = 9.4;
let FX_REAL = 9.4;

async function getFx(){
  try{
    const r = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
    const d = await r.json();
    FX_REAL = d.rates.KRW;
  }catch{
    FX_REAL = 9.4;
  }
}

async function sb(table, query=''){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  });
  if(!res.ok) throw new Error(table);
  return res.json();
}

function sum(arr,key){
  return arr.reduce((a,b)=>a+(b[key]||0),0);
}

function fm(n){
  return Math.round(n).toLocaleString();
}

async function loadAll(){

  await getFx();

  const y = document.getElementById('year').value;
  const m = document.getElementById('month').value;

  let q = `yy=eq.${y}`;
  if(m) q += `&mm=eq.${m}`;

  const [q23,owm,amz,rak] = await Promise.all([
    sb('qoo10_23y',q),
    sb('qoo10_owm',q),
    sb('amazon',q),
    sb('rakuten',q)
  ]);

  const sales =
    sum(q23.filter(r=>r.reason==='주문'),'sales') +
    sum(owm.filter(r=>r.reason==='주문'),'sales') +
    sum(amz.filter(r=>r.order_status!=='Cancelled'),'sales') +
    sum(rak.filter(r=>!['800','900'].includes(String(r.status))),'sales');

  document.getElementById('total').innerText = '¥ '+fm(sales);

  document.getElementById('krw').innerText =
    '₩ '+fm(sales*FX_FIXED)+' (고정) / ₩ '+fm(sales*FX_REAL)+' (실시간)';

  renderDailyChart(q23,owm,amz,rak);
}

async function loadByDate(){

  await getFx();

  const date = document.getElementById('date').value;
  if(!date) return alert('날짜 선택');

  const [q23,owm,amz,rak] = await Promise.all([
    sb('qoo10_23y',`order_date=eq.${date}`),
    sb('qoo10_owm',`order_date=eq.${date}`),
    sb('amazon',`order_date=eq.${date}`),
    sb('rakuten',`order_date=eq.${date}`)
  ]);

  const tQ = sum(q23.filter(r=>r.reason==='주문'),'sales');
  const tO = sum(owm.filter(r=>r.reason==='주문'),'sales');
  const tA = sum(amz.filter(r=>r.order_status!=='Cancelled'),'sales');
  const tR = sum(rak.filter(r=>!['800','900'].includes(String(r.status))),'sales');

  const total = tQ+tO+tA+tR;

  alert(
`날짜: ${date}

총 매출: ¥${fm(total)}
₩${fm(total*FX_FIXED)} (고정)
₩${fm(total*FX_REAL)} (실시간)

Qoo10: ¥${fm(tQ)}
OWM: ¥${fm(tO)}
Amazon: ¥${fm(tA)}
Rakuten: ¥${fm(tR)}`
  );
}

function renderDailyChart(q23,owm,amz,rak){

  const map={};

  function add(rows,filter){
    rows.filter(filter).forEach(r=>{
      const d = `${r.yy}-${r.mm}-${r.dd}`;
      if(!map[d]) map[d]=0;
      map[d]+=r.sales||0;
    });
  }

  add(q23,r=>r.reason==='주문');
  add(owm,r=>r.reason==='주문');
  add(amz,r=>r.order_status!=='Cancelled');
  add(rak,r=>!['800','900'].includes(String(r.status)));

  const labels = Object.keys(map).sort();
  const data = labels.map(k=>map[k]);

  new Chart(document.getElementById('chart'),{
    type:'bar',
    data:{
      labels,
      datasets:[{
        label:'일별 매출',
        data,
        backgroundColor:'#3b82f6'
      }]
    }
  });
}

</script>
</body>
</html>
