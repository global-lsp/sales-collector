- name: 매출 수집 실행
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          QOO10_23Y_KEY:   ${{ secrets.QOO10_23Y_KEY }}
          QOO10_23Y_PASS:  ${{ secrets.QOO10_23Y_PASS }}
          QOO10_OWM_KEY:   ${{ secrets.QOO10_OWM_KEY }}
          QOO10_OWM_PASS:  ${{ secrets.QOO10_OWM_PASS }}
        run: python collect.py

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install supabase pandas requests

      - name: 매출 수집 실행
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          QOO10_23Y_KEY:   ${{ secrets.QOO10_23Y_KEY }}
          QOO10_OWM_KEY:   ${{ secrets.QOO10_OWM_KEY }}
        run: python collect.py
